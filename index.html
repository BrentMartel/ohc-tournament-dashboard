<body>
<div id="root"><div class="loading-shell">Loading tournament data</div></div>
<script type="text/babel" data-presets="react">
const { useState, useEffect, useCallback, useMemo } = React;

const SCHEDULE_SHEET_ID = "11sEDdz4JWg7VlMuLyMWP7hfJXzsjHkscNjvYRJOR-Mo";
const STANDINGS_SHEET_ID = "1g4u13-1nB3M1cInWDzsuJ1kV2FOZj27XwiEYA-D0haI";
const REFRESH_MS = 5 * 60 * 1000;
const OHC_ALIASES = ["ohc", "max puissance", "max-puissance"];
const DIVISION_HEADER = "2012 D3 Contact";
const DIVISION_LEVEL_MATCH = "2012 d3";

function csvUrl(id) {
  return "https://docs.google.com/spreadsheets/d/" + id + "/gviz/tq?tqx=out:csv&_=" + Date.now();
}

async function fetchSheetRows(id) {
  const res = await fetch(csvUrl(id), { cache: "no-store" });
  if (!res.ok) throw new Error("Failed to fetch sheet (" + res.status + ")");
  const text = await res.text();
  const parsed = Papa.parse(text, { header: false, skipEmptyLines: false });
  return parsed.data;
}

function toInt(v) {
  if (v === undefined || v === null) return 0;
  const n = parseInt(String(v).trim(), 10);
  return Number.isNaN(n) ? 0 : n;
}

function normalize(s) {
  return String(s || "").trim().toLowerCase();
}

function isOHC(teamName) {
  const n = normalize(teamName);
  if (!n) return false;
  return OHC_ALIASES.some(a => n.includes(a));
}

function parseStandings(rows) {
  const startIdx = rows.findIndex(r => r && r[0] && String(r[0]).trim() === DIVISION_HEADER);
  if (startIdx === -1) return [];
  const teams = [];
  for (let i = startIdx + 2; i < rows.length; i++) {
    const row = rows[i];
    if (!row) break;
    const teamName = row[0] ? String(row[0]).trim() : "";
    if (!teamName) break;
    if (teamName.includes("D3")) break;
    teams.push({
      team: teamName,
      w: toInt(row[1]),
      sow: toInt(row[2]),
      sol: toInt(row[3]),
      l: toInt(row[4]),
      gf: toInt(row[5]),
      ga: toInt(row[6]),
      pts: toInt(row[7]),
    });
  }
  teams.forEach(t => {
    t.gp = t.w + t.sow + t.sol + t.l;
    t.gd = t.gf - t.ga;
  });
  teams.sort((a, b) => {
    if (b.pts !== a.pts) return b.pts - a.pts;
    if (b.gd !== a.gd) return b.gd - a.gd;
    return b.gf - a.gf;
  });
  return teams;
}

function parseScheduleAll(rows) {
  const games = [];
  let currentDay = "";
  for (const row of rows) {
    if (!row) continue;
    const cellA = row[0] ? String(row[0]).trim() : "";
    if (/April|Avril/i.test(cellA) && /20\d{2}/.test(cellA)) {
      currentDay = cellA.split("/")[0].trim();
      continue;
    }
    const gameNum = parseInt(cellA, 10);
    if (!gameNum) continue;
    const level = normalize(row[2]);
    if (!level.includes(DIVISION_LEVEL_MATCH)) continue;
    const away = row[3] ? String(row[3]).trim() : "";
    const home = row[6] ? String(row[6]).trim() : "";
    if (!away && !home) continue;
    const awayRaw = row[4] !== undefined ? String(row[4]).trim() : "";
    const homeRaw = row[7] !== undefined ? String(row[7]).trim() : "";
    const awayScoreMatch = awayRaw.match(/\d+/);
    const homeScoreMatch = homeRaw.match(/\d+/);
    const played = !!(awayScoreMatch && homeScoreMatch);
    const awayRegScore = played ? parseInt(awayScoreMatch[0], 10) : null;
    const homeRegScore = played ? parseInt(homeScoreMatch[0], 10) : null;
    const awayHasSO = /so/i.test(awayRaw);
    const homeHasSO = /so/i.test(homeRaw);
    const isShootout = awayHasSO || homeHasSO;
    games.push({
      gameNum,
      day: currentDay,
      time: row[1] ? String(row[1]).trim() : "",
      arena: row[8] ? String(row[8]).trim() : "",
      away,
      home,
      awayRegScore,
      homeRegScore,
      awayHasSO,
      homeHasSO,
      played,
      isShootout,
    });
  }
  games.sort((a, b) => a.gameNum - b.gameNum);
  return games;
}

function teamMatches(cellName, targetName) {
  if (!cellName || !targetName) return false;
  if (OHC_ALIASES.some(a => normalize(targetName).includes(a))) {
    return isOHC(cellName);
  }
  return normalize(cellName) === normalize(targetName);
}

function teamGamesView(allGames, teamName) {
  const games = [];
  for (const g of allGames) {
    const ourIsAway = teamMatches(g.away, teamName);
    const ourIsHome = teamMatches(g.home, teamName);
    if (!ourIsAway && !ourIsHome) continue;
    const opponent = ourIsHome ? g.away : g.home;
    let ourScore = null, oppScore = null, result = null;
    if (g.played) {
      const ourReg = ourIsHome ? g.homeRegScore : g.awayRegScore;
      const oppReg = ourIsHome ? g.awayRegScore : g.homeRegScore;
      const ourSOMark = ourIsHome ? g.homeHasSO : g.awayHasSO;
      const oppSOMark = ourIsHome ? g.awayHasSO : g.homeHasSO;
      if (g.isShootout && ourReg === oppReg) {
        if (ourSOMark && !oppSOMark) {
          ourScore = ourReg + 1;
          oppScore = oppReg;
          result = "SOW";
        } else if (oppSOMark && !ourSOMark) {
          ourScore = ourReg;
          oppScore = oppReg + 1;
          result = "SOL";
        } else {
          ourScore = ourReg;
          oppScore = oppReg;
          result = "T";
        }
      } else {
        ourScore = ourReg;
        oppScore = oppReg;
        if (ourScore > oppScore) result = g.isShootout ? "SOW" : "W";
        else if (ourScore < oppScore) result = g.isShootout ? "SOL" : "L";
        else result = "T";
      }
    }
    games.push({
      gameNum: g.gameNum,
      day: g.day,
      time: g.time,
      arena: g.arena,
      opponent,
      ourIsHome,
      ourScore,
      oppScore,
      played: g.played,
      result,
    });
  }
  return games;
}

function formatTime() {
  const d = new Date();
  const opts = { hour: "numeric", minute: "2-digit", hour12: true };
  return d.toLocaleTimeString([], opts);
}

function OHCTournamentDashboard() {
  const [standings, setStandings] = useState([]);
  const [allGames, setAllGames] = useState([]);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);
  const [lastUpdated, setLastUpdated] = useState(null);
  const [isRefreshing, setIsRefreshing] = useState(false);
  const [selectedTeam, setSelectedTeam] = useState(null);

  const load = useCallback(async () => {
    setIsRefreshing(true);
    try {
      const [standingsRows, scheduleRows] = await Promise.all([
        fetchSheetRows(STANDINGS_SHEET_ID),
        fetchSheetRows(SCHEDULE_SHEET_ID),
      ]);
      const parsedStandings = parseStandings(standingsRows);
      const parsedGames = parseScheduleAll(scheduleRows);
      setStandings(parsedStandings);
      setAllGames(parsedGames);
      setLastUpdated(formatTime());
      setError(null);
    } catch (e) {
      setError(e.message || "Could not reach the Google Sheets. Check that both sheets are set to anyone-with-link viewable.");
    } finally {
      setLoading(false);
      setIsRefreshing(false);
    }
  }, []);

  useEffect(() => {
    load();
    const id = setInterval(load, REFRESH_MS);
    const onFocus = () => load();
    window.addEventListener("focus", onFocus);
    return () => {
      clearInterval(id);
      window.removeEventListener("focus", onFocus);
    };
  }, [load]);

  const ohcRow = standings.find(t => isOHC(t.team));

  useEffect(() => {
    if (!selectedTeam && ohcRow) setSelectedTeam(ohcRow.team);
  }, [selectedTeam, ohcRow]);

  const activeTeamName = selectedTeam || (ohcRow && ohcRow.team);
  const teamRow = activeTeamName ? standings.find(t => teamMatches(t.team, activeTeamName)) : null;
  const teamPosition = teamRow ? standings.findIndex(t => t === teamRow) + 1 : null;
  const teamIsOHC = !!(teamRow && isOHC(teamRow.team));
  const games = useMemo(
    () => (activeTeamName ? teamGamesView(allGames, activeTeamName) : []),
    [allGames, activeTeamName]
  );
  const playedGames = games.filter(g => g.played);
  const upcomingGames = games.filter(g => !g.played);

  if (loading) {
    return <div className="loading-shell">Loading tournament data</div>;
  }

  return (
    <div style={{
      minHeight: "100vh",
      background: "radial-gradient(ellipse at top, #0a1929 0%, #050d18 50%, #020509 100%)",
      color: "#e8f1f8",
    }}>
      <GlobalStyles />
      <Header lastUpdated={lastUpdated} isRefreshing={isRefreshing} onRefresh={load} error={error} />
      {teamRow && (
        <TeamSummary
          teamRow={teamRow}
          teamPosition={teamPosition}
          totalTeams={standings.length}
          isOHC={teamIsOHC}
          onBackToOHC={ohcRow ? () => setSelectedTeam(ohcRow.team) : null}
        />
      )}
      {playedGames.length > 0 && (
        <Section title="Played" subtitle={playedGames.length + " games"}>
          <div style={{ display: "flex", flexDirection: "column", gap: "10px" }}>
            {playedGames.map(g => <GameCard key={g.gameNum} game={g} teamIsOHC={teamIsOHC} teamName={teamRow ? teamRow.team : ""} />)}
          </div>
        </Section>
      )}
      {upcomingGames.length > 0 && (
        <Section title="Upcoming" subtitle={upcomingGames.length + " scheduled"}>
          <div style={{ display: "flex", flexDirection: "column", gap: "10px" }}>
            {upcomingGames.map(g => <GameCard key={g.gameNum} game={g} teamIsOHC={teamIsOHC} teamName={teamRow ? teamRow.team : ""} />)}
          </div>
        </Section>
      )}
      {standings.length > 0 && (
        <Section title="Standings" subtitle="2012 D3 Contact · tap a team">
          <StandingsTable
            standings={standings}
            selectedTeam={activeTeamName}
            onSelect={(team) => setSelectedTeam(team)}
          />
        </Section>
      )}
      <Footer lastUpdated={lastUpdated} />
    </div>
  );
}

function TeamSummary({ teamRow, teamPosition, totalTeams, isOHC, onBackToOHC }) {
  const suffix = (n) => {
    if (n === 1) return "st";
    if (n === 2) return "nd";
    if (n === 3) return "rd";
    return "th";
  };
  const accent = isOHC ? "#ef4444" : "#94b8d6";
  return (
    <div style={{ padding: "20px" }}>
      <div className={"scoreboard" + (isOHC ? " glow-red" : "")} style={{ borderRadius: "12px", padding: "22px 20px" }}>
        <div style={{
          display: "flex", justifyContent: "space-between",

          gap: "10px", flexWrap: "wrap",
        }}>
          <div className="display-font" style={{
            fontSize: "22px", lineHeight: "1.1", color: "#ffffff",
            letterSpacing: "0.02em",
          }}>
            {teamRow.team.toUpperCase()}
          </div>
          {!isOHC && onBackToOHC && (
            <button className="refresh-btn" onClick={onBackToOHC}>
              <span>&larr;</span> Back to OHC
            </button>
          )}

          display: "flex", justifyContent: "space-between",
          alignItems: "flex-start", marginBottom: "18px",
        }}>

              Current Standing

              {teamPosition}<span style={{ fontSize: "22px", color: accent }}>{suffix(teamPosition)}</span>

            <div className="heading-font" style={{
              fontSize: "11px", color: "#94b8d6",
              letterSpacing: "0.05em", marginTop: "2px",
            }}>

            <div className="heading-font" style={{
              fontSize: "10px", color: "#7891a8",
              letterSpacing: "0.15em", marginBottom: "2px",
              textTransform: "uppercase",

              Points

    </div>
  );
}

function Section({ title, subtitle, children }) {
  return (
    <div style={{ padding: "0 20px 20px" }}>
      <div style={{
        display: "flex", alignItems: "baseline",
        justifyContent: "space-between",
        borderBottom: "2px solid rgba(239, 68, 68, 0.3)",
        paddingBottom: "8px", marginBottom: "14px",
      }}>
        <h2 className="display-font" style={{
          fontSize: "22px", margin: 0, color: "#ffffff", letterSpacing: "0.02em",
        }}>
          {title}
        </h2>
        <span className="heading-font" style={{
          fontSize: "10px", color: "#7891a8",
          letterSpacing: "0.15em", textTransform: "uppercase",
        }}>
          {subtitle}
        </span>
      </div>
      {children}
    </div>
  );
}

function GameCard({ game, teamIsOHC, teamName }) {
  const badgeMap = {
    W: { cls: "win-badge", label: "WIN" },
    SOW: { cls: "sow-badge", label: "SO WIN" },
    SOL: { cls: "sol-badge", label: "SO LOSS" },
    L: { cls: "loss-badge", label: "LOSS" },
    T: { cls: "tie-badge", label: "TIE" },
  };
  const isWin = game.result === "W" || game.result === "SOW";
  const badge = game.played ? badgeMap[game.result] : { cls: "upcoming-badge", label: "UPCOMING" };
  const ourLabel = teamIsOHC ? "OHC" : (teamName ? teamName.toUpperCase() : "TEAM");
  const ourColor = teamIsOHC ? "#ef4444" : "#94b8d6";
  return (
    <div className="ice-edge" style={{ borderRadius: "10px", padding: "14px 16px" }}>
      <div style={{
        display: "flex", justifyContent: "space-between",
        alignItems: "center", marginBottom: "10px",
      }}>
        <div>
          <div className="heading-font" style={{
            fontSize: "10px", color: "#7891a8",
            letterSpacing: "0.12em", textTransform: "uppercase",
          }}>
            Game {game.gameNum} · {game.day}
          </div>
          <div style={{ fontSize: "11.5px", color: "#94b8d6", marginTop: "2px" }}>
            {game.time}{game.arena ? " · " + game.arena : ""}{game.ourIsHome ? " · Home" : " · Away"}
          </div>
        </div>
        <span className={badge.cls + " heading-font"} style={{
          padding: "4px 10px", borderRadius: "4px",
          fontSize: "10px", fontWeight: 700,
          letterSpacing: "0.08em", color: "white",
        }}>
          {badge.label}
        </span>
      </div>
      <div style={{
        display: "grid", gridTemplateColumns: "1fr auto 1fr",
        gap: "12px", alignItems: "center",
      }}>
        <div style={{ textAlign: "left", minWidth: 0 }}>
          <div className="heading-font" style={{
            fontSize: "11px", color: ourColor,
            letterSpacing: "0.08em", textTransform: "uppercase", fontWeight: 600,
            whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis",
          }}>
            {ourLabel}
          </div>
          <div className="display-font" style={{
            fontSize: "36px", lineHeight: "1",
            color: game.played ? (isWin ? "#34d399" : "#94b8d6") : "#475569",
          }}>
            {game.played ? game.ourScore : "-"}
          </div>
        </div>
        <div className="display-font" style={{
          fontSize: "14px", color: "#475569", letterSpacing: "0.1em",
        }}>
          VS
        </div>
        <div style={{ textAlign: "right", minWidth: 0 }}>
          <div className="heading-font" style={{
            fontSize: "11px", color: "#94b8d6",
            letterSpacing: "0.05em", fontWeight: 500,
            whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis",
          }}>
            {game.opponent.toUpperCase()}
          </div>
          <div className="display-font" style={{
            fontSize: "36px", lineHeight: "1", color: "#ffffff",
          }}>
            {game.played ? game.oppScore : "-"}
          </div>
        </div>
      </div>
    </div>
  );
}

function StandingsTable({ standings, selectedTeam, onSelect }) {
  return (
    <>
      <div className="ice-edge" style={{ borderRadius: "10px", overflow: "hidden" }}>
        <table>
          <thead>
            <tr>
              <th style={{ width: "28px" }}>#</th>
              <th>Team</th>
              <th>GP</th>
              <th>Rec</th>
              <th>Pts</th>
              <th>Diff</th>
            </tr>
          </thead>
          <tbody>
            {standings.map((t, i) => {
              const ohc = isOHC(t.team);
              const isSelected = selectedTeam && normalize(t.team) === normalize(selectedTeam);
              const posClass = ohc ? "pos-ohc" : i < 3 ? "pos-top3" : i < 8 ? "pos-top8" : "pos-rest";
              const rowClass = [
                "team-row",
                ohc ? "ohc-row" : "",
                isSelected && !ohc ? "selected-row" : "",
              ].filter(Boolean).join(" ");
              return (
                <tr
                  key={t.team + i}
                  className={rowClass}
                  onClick={() => onSelect && onSelect(t.team)}
                  role="button"
                  tabIndex={0}
                  onKeyDown={(e) => {
                    if (e.key === "Enter" || e.key === " ") {
                      e.preventDefault();
                      onSelect && onSelect(t.team);
                    }
                  }}
                >
                  <td><span className={"pos-badge " + posClass}>{i + 1}</span></td>
                  <td style={{
                    fontWeight: ohc || isSelected ? 700 : 500,
                    color: ohc || isSelected ? "#ffffff" : "#cbd5e1",
                    fontSize: "12.5px",
                  }}>
                    {t.team}
                  </td>
                  <td className="mono-font" style={{ color: "#94b8d6", fontSize: "12px" }}>
                    {t.gp}
                  </td>
                  <td className="mono-font" style={{ color: "#cbd5e1", fontSize: "12px", whiteSpace: "nowrap" }}>
                    {t.w}-{t.sow}-{t.l}
                  </td>
                  <td className="display-font" style={{
                    fontSize: "17px", color: ohc ? "#ef4444" : "#ffffff",
                  }}>
                    {t.pts}
                  </td>
                  <td className="mono-font" style={{
                    fontSize: "12px", fontWeight: 700,
                    color: t.gd > 0 ? "#34d399" : t.gd < 0 ? "#f87171" : "#94b8d6",
                  }}>
                    {t.gd > 0 ? "+" : ""}{t.gd}
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
      <div className="heading-font" style={{
        marginTop: "14px", display: "flex",
        gap: "14px", flexWrap: "wrap",
        fontSize: "10.5px", color: "#7891a8",
        letterSpacing: "0.05em", textTransform: "uppercase",
      }}>
        <LegendDot color="linear-gradient(135deg, #fbbf24, #d97706)" label="Top 3" />
        <LegendDot color="rgba(59, 130, 246, 0.4)" label="Top 8" />
        <LegendDot color="linear-gradient(135deg, #ef4444, #b91c1c)" label="OHC" />
        <span style={{ color: "#56728c", textTransform: "none", letterSpacing: 0 }}>
          Record shows W-SOW-L
        </span>
      </div>
    </>
  );
}

function LegendDot({ color, label }) {
  return (
    <div style={{ display: "flex", alignItems: "center", gap: "6px" }}>
      <span style={{
        width: "10px", height: "10px",
        borderRadius: "3px", background: color,
        display: "inline-block",
      }} />
      <span>{label}</span>
    </div>
  );
}

function Footer({ lastUpdated }) {
  return (
    <div style={{
      padding: "16px 20px 40px",
      borderTop: "1px solid rgba(148, 184, 214, 0.08)",
      fontSize: "11.5px", color: "#7891a8", lineHeight: "1.6",
    }}>
      <div style={{ marginBottom: "8px" }}>
        <strong style={{ color: "#94b8d6" }}>Scoring:</strong> W = 3, SOW = 2, SOL = 1, L = 0. Goal differential shown here is raw (GF minus GA); official tiebreakers use a 7 goal per game cap.
      </div>
      <div style={{ color: "#56728c" }}>
        Data pulls live from the official tournament Google Sheets. Auto refresh every 5 minutes. Last updated {lastUpdated || "-"}.
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<OHCTournamentDashboard />);
</script>
</body>
</html>
